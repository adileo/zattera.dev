syntax = "proto3";

package zattera.v1;

import "google/protobuf/duration.proto";
import "zattera/v1/common.proto";

// AlertRule fires notifications on metrics thresholds or event kinds
// (spec §3.10 / F23).
message AlertRule {
  Meta meta = 1;
  string name = 2;
  string project_id = 3; // "" = cluster-wide (admin only)
  // Either a metric condition...
  MetricCondition metric = 4;
  // ...or an event kind match (e.g. "deploy.failed", "node.down").
  string event_kind = 5;
  repeated string channel_ids = 6;
  bool disabled = 7;
}

message MetricCondition {
  string metric = 1;   // "cpu_percent", "memory_percent", "disk_percent", "error_rate", ...
  string scope = 2;    // "node:<id>" | "env:<id>" | "cluster"
  string op = 3;       // ">" | "<"
  double threshold = 4;
  google.protobuf.Duration sustained = 5; // must hold this long
}

// NotificationChannel is a delivery target (webhook/Slack/email).
message NotificationChannel {
  Meta meta = 1;
  string name = 2;
  string type = 3; // "webhook" | "slack" | "email" | "telegram"
  // type-specific settings; secret values encrypted:
  string webhook_url_plain = 4;             // webhook: may be non-secret
  EncryptedValue webhook_secret = 5;        // optional HMAC signing key
  EncryptedValue slack_webhook_url = 6;
  string email_to = 7;
  SMTPConfig smtp = 8;
  EncryptedValue telegram_bot_token = 9;    // telegram: bot API token (secret)
  string telegram_chat_id = 10;             // telegram: target chat/channel id
}

message SMTPConfig {
  string host = 1;
  uint32 port = 2;
  string username = 3;
  EncryptedValue password = 4;
  string from = 5;
  bool starttls = 6;
}
