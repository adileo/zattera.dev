syntax = "proto3";

package zattera.v1;

import "zattera/v1/common.proto";

// Org is the top-level tenancy unit (spec §4). Single-org clusters are the
// common case; the default org is created at bootstrap.
message Org {
  Meta meta = 1;
  string name = 2;
}

// User is a local user (SSO is M4+). password_hash is an argon2id PHC string;
// API handlers MUST clear it before returning a User to clients.
message User {
  Meta meta = 1;
  string email = 2;
  string display_name = 3;
  string password_hash = 4;
  string org_id = 5;
  Role org_role = 6;
}

// Project scopes apps, members, volumes and internal DNS (spec F3).
message Project {
  Meta meta = 1;
  string org_id = 2;
  string name = 3; // DNS-safe: [a-z0-9-], used in *.internal names
}

// ProjectMember grants a user a role on a project.
message ProjectMember {
  string project_id = 1;
  string user_id = 2;
  Role role = 3;
}
